name: bot-poll

# Сам Telegram-бот (/forecast, /errors, /help), работающий сессиями long polling —
# GitHub Actions не умеет держать процесс вечно, а cron у Actions негарантированный:
# заявленный '*/5' на практике стреляет раз в 10–60 минут (best-effort, особенно в
# часы пик). Поэтому непрерывность обеспечивается не кроном, а двумя механизмами:
#
#   1. Длинная сессия: бот поднимается на BOT_POLL_SECONDS (25 мин) и отвечает
#      сразу, а не «когда-нибудь при следующем кроне».
#   2. Цепочка самоперезапуска: успешная сессия в конце диспатчит следующий запуск
#      (workflow_dispatch через GITHUB_TOKEN — документированное исключение из
#      защиты от рекурсии). Пауза между сессиями ≈ время setup (~1 мин).
#
# Cron '*/5' остаётся сторожем: упавшая сессия цепочку НЕ продолжает (перезапуск
# только при success — иначе стойкая ошибка крутилась бы бесконечно), и тогда
# ближайший сработавший cron оживляет цепочку. Пока цепочка жива, cron-запуски
# просто перехватывают её через concurrency (старая сессия отменяется).
#
# Ничего не пишет в git: /forecast тянет прогноз лениво напрямую у источников
# (app/bot/live.py, в БД не сохраняет), /errors только читает БД, которую
# наполняют fetch из weather-jobs.yml и verify из verify-actuals.yml.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write   # самодиспатч следующей сессии (gh workflow run)

# cancel-in-progress безопасен: воркфлоу ничего не коммитит, отменить текущую
# сессию в пользу свежей — не потеря данных. Отменённая сессия следующий запуск
# не диспатчит — цепочку продолжает отменивший её запуск.
concurrency:
  group: bot-poll
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install .
      - run: mkdir -p data  # на случай самого первого запуска, пока weather-jobs.yml ещё не закоммитил БД
      - name: Poll Telegram for updates
        run: python -m app.main
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ALLOWED_CHAT_IDS: ${{ secrets.ALLOWED_CHAT_IDS }}
          DB_PATH: data/la_weather.db
          BOT_POLL_SECONDS: "1500"
      - name: Chain next session
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bot-poll.yml --ref "${{ github.ref_name }}"
