name: verify-actuals

# Верификация отделена от fetch: у каждого задания собственный cron без
# дублирующего сравнения github.event.schedule.
on:
  schedule:
    - cron: '0 17,23 * * *'  # ≈ LA 09:00/15:00 (PST)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weather-db-write
  cancel-in-progress: false

env:
  DB_PATH: data/la_weather.db

jobs:
  verify-actuals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install .
      - run: mkdir -p data
      - name: Verify actuals
        run: python -m scripts.run_job verify
      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/la_weather.db
          git diff --staged --quiet || git commit -m "chore: verify actuals [skip ci]"
          git pull --rebase
          git push
